<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Item - Lost & Found Portal</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.jsp" class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      Find<span>It</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.jsp">Dashboard</a>
      <a href="login.html">Logout</a>
    </div>
  </nav>

  <main class="form-page-container">
    <div class="glass-panel submission-card animate-fade-in" style="max-width: 500px;">
      <h1 style="margin-bottom: 0.5rem; font-size: 1.8rem;">Claim an Item</h1>
      <p id="claimItemName" style="color: var(--primary-color); font-weight: 500; margin-bottom: 0.5rem;"></p>
      <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Provide proof of ownership so an admin can verify your claim.</p>

      <form id="claimForm" action="ClaimServlet" method="POST">
        <input type="hidden" id="itemId" name="itemId" value="">

        <div class="form-group">
          <label for="claimantName">Your Name</label>
          <input type="text" id="claimantName" name="claimantName" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="claimantEmail">Your Email</label>
          <input type="email" id="claimantEmail" name="claimantEmail" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="proof">Proof of Ownership</label>
          <textarea id="proof" name="proof" class="form-control" rows="5" placeholder="Describe distinguishing features, serial numbers, purchase receipts, or any other proof that this item belongs to you..." required></textarea>
        </div>

        <button type="submit" class="btn-primary">Submit Claim</button>
      </form>
    </div>
  </main>

  <script>
    // Extract query params to pre-fill hidden item ID and display item name
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('id');
    const itemName = params.get('name');

    if (itemId) {
      document.getElementById('itemId').value = itemId;
    }
    if (itemName) {
      document.getElementById('claimItemName').textContent = 'Item: ' + decodeURIComponent(itemName);
    }

    // Client-side validation
    document.getElementById('claimForm').addEventListener('submit', function(e) {
      const name = document.getElementById('claimantName').value.trim();
      const email = document.getElementById('claimantEmail').value.trim();
      const proof = document.getElementById('proof').value.trim();

      if (!name || !email || !proof) {
        e.preventDefault();
        alert('Please fill in all fields.');
        return;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        e.preventDefault();
        alert('Please enter a valid email address.');
        return;
      }
      if (proof.length < 20) {
        e.preventDefault();
        alert('Please provide more detailed proof of ownership (at least 20 characters).');
        return;
      }
    });
  </script>
</body>
</html>
