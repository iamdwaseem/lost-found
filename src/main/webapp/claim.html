<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Item - Lost & Found Portal</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.jsp" class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      Find<span>It</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.jsp">Dashboard</a>
      <a href="LogoutServlet">Logout</a>
    </div>
  </nav>

  <main class="form-page-container">
    <div class="glass-panel submission-card animate-fade-in" style="max-width: 550px;">
      <h1 style="margin-bottom: 0.5rem; font-size: 1.8rem;">Claim an Item</h1>
      <p id="claimItemName" style="color: var(--primary-color); font-weight: 500; margin-bottom: 0.5rem;"></p>
      <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Provide proof of ownership. An admin will review your claim and may ask follow-up questions.</p>

      <form id="claimForm" action="ClaimServlet" method="POST" enctype="multipart/form-data">
        <input type="hidden" id="itemId" name="itemId" value="">

        <div class="form-group">
          <label for="claimantName">Your Name</label>
          <input type="text" id="claimantName" name="claimantName" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="claimantEmail">Your Email</label>
          <input type="email" id="claimantEmail" name="claimantEmail" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="proof">Describe Your Proof of Ownership</label>
          <textarea id="proof" name="proof" class="form-control" rows="4" placeholder="Describe distinguishing features, serial numbers, purchase receipts, or any other proof..." required></textarea>
        </div>

        <div class="form-group">
          <label>Upload Proof Image (optional)</label>
          <div class="file-upload-wrapper">
            <div class="upload-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </div>
            <p class="upload-text">Upload receipt, photo, or evidence</p>
            <input type="file" id="proofImage" name="proofImage" accept="image/png, image/jpeg, image/jpg, image/gif">
          </div>
          <div id="proofFileName" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--success-color);"></div>
        </div>

        <button type="submit" class="btn-primary">Submit Claim</button>
      </form>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('id');
    const itemName = params.get('name');
    if (itemId) document.getElementById('itemId').value = itemId;
    if (itemName) document.getElementById('claimItemName').textContent = 'Item: ' + decodeURIComponent(itemName);

    // Show selected file name
    document.getElementById('proofImage').addEventListener('change', function() {
      const display = document.getElementById('proofFileName');
      display.textContent = this.files.length > 0 ? 'Selected: ' + this.files[0].name : '';
    });

    // Validation
    document.getElementById('claimForm').addEventListener('submit', function(e) {
      const name = document.getElementById('claimantName').value.trim();
      const email = document.getElementById('claimantEmail').value.trim();
      const proof = document.getElementById('proof').value.trim();
      if (!name || !email || !proof) { e.preventDefault(); alert('Please fill in all required fields.'); return; }
      if (!/^\S+@\S+\.\S+$/.test(email)) { e.preventDefault(); alert('Please enter a valid email.'); return; }
      if (proof.length < 20) { e.preventDefault(); alert('Please provide more detailed proof (at least 20 characters).'); return; }

      // Validate image type if provided
      const fileInput = document.getElementById('proofImage');
      if (fileInput.files.length > 0) {
        const validTypes = ['image/jpeg', 'image/png', 'image/jpg', 'image/gif'];
        if (!validTypes.includes(fileInput.files[0].type)) {
          e.preventDefault(); alert('Only image files (JPEG, PNG, GIF) are allowed.'); return;
        }
      }
    });
  </script>
</body>
</html>
