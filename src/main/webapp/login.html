<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lost & Found Portal</title>
  <meta name="description" content="Login to the Lost & Found Portal to report or search for items.">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <nav class="navbar">
    <a href="login.html" class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      Find<span>It</span>
    </a>
    <div class="nav-links">
      <a href="register.html">Register</a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="glass-panel auth-card animate-fade-in">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Login to report or find an item</p>
      </div>

      <!-- Success message (after registration) -->
      <div id="successMsg" style="display: none; background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: 0.9rem;">
        Account created successfully! Please login.
      </div>

      <!-- Error message -->
      <div id="errorMsg" style="display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: 0.9rem;">
        Invalid email or password.
      </div>

      <form id="loginForm" action="LoginServlet" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me</label>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Create one</a></p>
      </div>
    </div>
  </main>

  <script src="js/validation.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) document.getElementById('errorMsg').style.display = 'block';
    if (params.get('registered')) document.getElementById('successMsg').style.display = 'block';
  </script>
</body>
</html>
